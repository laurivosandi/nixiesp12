---
name: esp32c3-arduino

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:

  build:
    permissions:
      contents: write

    strategy:
      matrix:
        arduino-platform: ["esp32:esp32"]
        include:
          - arduino-platform: "esp32:esp32"
            fqbn: "esp32:esp32:esp32c3"

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure Arduino CLI
        run: arduino-cli config set network.connection_timeout 600s

      - name: Install platform
        run: >
          arduino-cli core install
          ${{ matrix.arduino-platform }}

      - name: Install libraries
        run: arduino-cli lib install wifimanager

      - name: Make timezones
        run: python3 firmware/cities.py > firmware/esp32c3-arduino/cities.h

      - name: Compile Sketch
        run: >
          arduino-cli compile --fqbn ${{ matrix.fqbn }} -e
          firmware/esp32c3-arduino

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PATH: ./firmware/esp32c3-arduino/build/esp32.esp32.esp32c3/esp32c3-arduino.ino.bin
          ASSET_NAME: nixiesp12-esp32c3-arduino.bin
        run: |
          set -eu

          release_tag="${GITHUB_REF_NAME}"
          release_title="Release ${GITHUB_REF_NAME}"

          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release create "${release_tag}" --title "${release_title}" --target "${GITHUB_SHA}" || gh release view "${release_tag}" >/dev/null
          fi

          gh release upload "${release_tag}" "${ASSET_PATH}#${ASSET_NAME}" --clobber
